<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng & Voucher — Onevora</title>
    <meta name="description" content="Quản lý lịch sử đơn hàng, theo dõi tiến trình vận chuyển và kiểm tra kho voucher ưu đãi của bạn tại Onevora.">
    <meta name="keywords" content="lịch sử mua hàng, đơn hàng, voucher, thành viên, onevora">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f1115;
            --bg-card: #1a1d23;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .dashboard-header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 17, 21, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand-box { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .brand-logo { 
            width: 40px; height: 40px; background: var(--text-main); color: var(--bg-deep); 
            border-radius: 10px; display: grid; place-items: center; font-weight: 800; font-size: 1.2rem;
        }
        .brand-name { font-weight: 700; font-size: 1rem; letter-spacing: 1px; text-transform: uppercase; }

        .stats-top { display: flex; gap: 24px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .stat-val { font-size: 1.1rem; font-weight: 800; }

        /* ── MAIN CONTENT ── */
        .dashboard-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .profile-hero {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #111, #333);
            display: grid; place-items: center; font-size: 2.2rem;
            border: 3px solid rgba(255,255,255,0.1);
        }

        .profile-info h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
        .rank-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* ── TABS ── */
        .tab-controls {
            display: flex; gap: 12px; margin-bottom: 24px;
            background: rgba(255,255,255,0.03); padding: 6px; border-radius: 14px; width: fit-content;
        }

        .tab-btn {
            background: transparent; border: none; color: var(--text-dim);
            padding: 10px 24px; border-radius: 10px; cursor: pointer;
            font-family: inherit; font-weight: 600; font-size: 0.9rem; transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--text-main); color: var(--bg-deep);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .tab-pane { display: none; animation: fadeIn 0.4s ease; }
        .tab-pane.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ── ORDER CARDS ── */
        .order-card {
            background: var(--bg-card); border-radius: 20px; padding: 24px;
            margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.03);
        }

        .order-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
        .order-meta h3 { font-size: 1.05rem; font-weight: 700; }
        .order-meta p { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

        .status-pill {
            padding: 6px 14px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
        }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--accent); }
        .status-shipping { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
        .status-completed { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-cancelled { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .order-total { font-weight: 700; font-size: 1rem; }
        .btn-track {
            background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-track:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 4px 15px var(--primary-glow); }

        /* ── NEW: FILTER CHIPS ── */
        .filter-row { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 18px; border-radius: 99px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim); font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

        /* ── NEW: THUMBNAILS & LAYOUT ── */
        .order-content-row { display: flex; gap: 20px; align-items: center; }
        .order-thumb {
            width: 70px; height: 70px; border-radius: 12px; background: #222; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        .order-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* ── PROGRESS CONTAINER (ACCORDION) ── */
        .accordion-content { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0; padding: 0 10px; border-top: 0 solid rgba(255,255,255,0.05);
        }
        .accordion-content.open { 
            max-height: 800px; margin-top: 24px; padding-top: 24px; border-top-width: 1px;
        }

        .progress-bar { display: flex; justify-content: space-between; position: relative; margin-bottom: 30px; }
        .progress-bar::before {
            content: ''; position: absolute; top: 12px; left: 10%; right: 10%; height: 2px;
            background: rgba(255,255,255,0.1); z-index: 0;
        }

        .p-step {
            display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; z-index: 1; flex: 1;
        }

        .p-dot { 
            width: 26px; height: 26px; border-radius: 50%; background: var(--bg-card); 
            border: 2px solid rgba(255,255,255,0.1); display: grid; place-items: center; font-size: 0.75rem; transition: 0.4s; font-weight: 800;
        }
        .p-label { font-size: 0.7rem; font-weight: 600; color: var(--text-dim); }

        .p-step.done .p-dot { background: var(--success); border-color: var(--success); color: #fff; }
        .p-step.done .p-label { color: var(--success); }
        .p-step.active .p-dot { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow); color: #fff; }
        .p-step.active .p-label { color: var(--primary); }

        /* ── ITEM MINI LIST ── */
        .item-mini-list { display: flex; flex-direction: column; gap: 12px; }
        .item-mini { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-dim); }
        .item-mini b { color: var(--text-main); }

        /* ── VOUCHER CARDS ── */
        .voucher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-copy { 
            background: var(--text-main); color: var(--bg-deep); border: none; padding: 10px 16px; border-radius: 8px;
            font-size: 0.72rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .btn-copy:hover { transform: scale(1.05); background: var(--primary); color: #fff; }

        .voucher-card {
            background: var(--bg-card); border-radius: 16px; padding: 24px; position: relative;
            border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center;
            overflow: hidden; transition: 0.3s;
        }
        .voucher-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .voucher-card::before, .voucher-card::after {
            content: ''; position: absolute; left: -10px; top: 50%; width: 20px; height: 20px; 
            background: var(--bg-deep); border-radius: 50%; transform: translateY(-50%);
        }
        .voucher-card::after { left: auto; right: -10px; }

        .v-info h4 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; color: var(--text-main); }
        .v-info p { font-size: 0.75rem; color: var(--text-dim); }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 80px 0; color: var(--text-dim); }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

        @media (max-width: 768px) {
            .voucher-grid { grid-template-columns: 1fr; }
            .dashboard-header { padding: 20px; }
            .stats-top { display: none; }
        }
    </style>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>

      window.dataLayer = window.dataLayer || [];

</head>
<body>

    <header class="dashboard-header">
        <a href="index.html" class="brand-box">
            <div class="brand-logo">F</div>
            <span class="brand-name">Onevora</span>
        </a>
        <div class="stats-top">
            <div class="stat-item">
                <p class="stat-label">Đơn hàng</p>
                <p class="stat-val" id="count-orders">0</p>
            </div>
            <div class="stat-item">
                <p class="stat-label">Voucher</p>
                <p class="stat-val" id="count-vouchers">0</p>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        
        <div class="profile-hero">
            <div class="profile-avatar">👤</div>
            <div class="profile-info" style="flex: 1;">
                <h1 id="user-display-name">Loading...</h1>
                <div class="rank-badge">★ Khách hàng thân thiết</div>
            </div>
            <button class="btn-track" onclick="openEditProfile()" style="background: var(--primary); border-color: var(--primary);">
                <i class="bi bi-pencil-square"></i> Sửa hồ sơ
            </button>
        </div>

        <div class="tab-controls">
            <button class="tab-btn active" onclick="switchTab('orders', this)">Lịch sử đơn hàng</button>
            <button class="tab-btn" onclick="switchTab('vouchers', this)">Kho Voucher</button>
        </div>

        <!-- Tab: Đơn hàng -->
        <div id="pane-orders" class="tab-pane active">
            <div id="filter-chips" class="filter-row">
                <!-- Injected by JS -->
            </div>
            <div id="orders-list">
                <div class="empty-state">Đang tải dữ liệu...</div>
            </div>
        </div>

        <!-- Tab: Voucher -->
        <div id="pane-vouchers" class="tab-pane">
            <div class="voucher-grid" id="vouchers-list">
                <div class="empty-state">Đang tải voucher...</div>
            </div>
        </div>

    </main>

    <!-- Modal Chỉnh sửa hồ sơ -->
    <div id="modal-edit-profile" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div style="background: var(--bg-card); border-radius: 24px; padding: 32px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="margin-bottom: 24px; font-weight: 800; font-size: 1.5rem;">Chỉnh sửa hồ sơ</h2>
            
            <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px;">Họ và Tên</label>
                    <input id="edit-fullname" type="text" placeholder="Nhập họ tên của bạn" style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; font-family: inherit;">
                </div>
                <div class="form-group">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px;">Số điện thoại</label>
                    <input id="edit-phone" type="tel" placeholder="Nhập số điện thoại" style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; font-family: inherit;">
                </div>
                <div class="form-group">
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px;">Địa chỉ mặc định</label>
                    <input id="edit-address" type="text" placeholder="Số nhà, tên đường, quận/huyện..." style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; font-family: inherit;">
                </div>
            </div>

            <div style="display: flex; gap: 12px;">
                <button onclick="closeEditProfile()" style="flex: 1; padding: 14px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-weight: 700; cursor: pointer; font-family: inherit;">Hủy</button>
                <button id="btn-save-profile" onclick="saveProfile()" style="flex: 1; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px var(--primary-glow); font-family: inherit;">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        let myOrders = [];
        let myVouchers = [];
        let currentStatusFilter = 'all';

        async function initDashboard() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('user-display-name').innerText = user.username;

            renderFilterChips();
            await loadData();
            await fetchProfile(); // Tải thêm thông tin chi tiết
            startAutoRefresh();
        }

        async function fetchProfile() {
            try {
                const token = getAuthToken();
                const res = await fetch(`${API_BASE}/auth/me`, { // Giả sử có endpoint này hoặc lấy từ User API
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('edit-fullname').value = data.fullName || '';
                    document.getElementById('edit-phone').value = data.phone || '';
                    document.getElementById('edit-address').value = data.address || '';
                    if (data.fullName) {
                        document.getElementById('user-display-name').innerText = data.fullName;
                    }
                }
            } catch (e) { console.error("Fetch profile error", e); }
        }

        function openEditProfile() {
            document.getElementById('modal-edit-profile').style.display = 'flex';
        }

        function closeEditProfile() {
            document.getElementById('modal-edit-profile').style.display = 'none';
        }

        async function saveProfile() {
            const fullName = document.getElementById('edit-fullname').value.trim();
            const phone = document.getElementById('edit-phone').value.trim();
            const address = document.getElementById('edit-address').value.trim();
            
            const btn = document.getElementById('btn-save-profile');
            const originalText = btn.innerText;

            try {
                btn.disabled = true;
                btn.innerText = "Đang lưu...";
                
                const token = getAuthToken();
                const res = await fetch(`${API_BASE}/users/profile`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({ fullName, phone, address })
                });

                if (res.ok) {
                    alert("Cập nhật hồ sơ thành công!");
                    closeEditProfile();
                    if (fullName) document.getElementById('user-display-name').innerText = fullName;
                } else {
                    const data = await res.json();
                    alert(data.message || "Lỗi cập nhật hồ sơ");
                }
            } catch (e) {
                alert("Lỗi kết nối server");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function loadData() {
            try {
                const token = getAuthToken();
                
                // Load Orders
                const oRes = await fetch(`${API_BASE}/orders/my`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                myOrders = await oRes.json();
                renderOrders();

                // Load Vouchers
                const vRes = await fetch(`${API_BASE}/vouchers/my`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                myVouchers = await vRes.json();
                renderVouchers();

                // Update Stats
                document.getElementById('count-orders').innerText = myOrders.length;
                document.getElementById('count-vouchers').innerText = myVouchers.length;

            } catch (e) {
                console.error("Load fallback error", e);
            }
        }

        function renderFilterChips() {
            const filters = [
                { id: 'all', label: 'Tất cả' },
                { id: 'pending', label: 'Chờ xử lý' },
                { id: 'shipping', label: 'Đang giao' },
                { id: 'completed', label: 'Hoàn thành' }
            ];
            
            const container = document.getElementById('filter-chips');
            container.innerHTML = filters.map(f => `
                <div class="chip ${currentStatusFilter === f.id ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}</div>
            `).join('');
        }

        function setFilter(status) {
            currentStatusFilter = status;
            renderFilterChips();
            renderOrders();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`pane-${tab}`).classList.add('active');
            btn.classList.add('active');
        }

        function renderOrders() {
            const container = document.getElementById('orders-list');
            
            let filtered = [...myOrders];
            if (currentStatusFilter !== 'all') {
                filtered = myOrders.filter(o => o.status === currentStatusFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>Không tìm thấy đơn hàng nào.</p></div>';
                return;
            }

            container.innerHTML = filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(order => {
                const statusInfo = getStatusLabel(order.status);
                const progressHtml = renderProgress(order);
                const firstItem = order.items?.[0] || {};
                const thumb = firstItem.img || firstItem.image || 'https://via.placeholder.com/150';

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-content-row">
                                <div class="order-thumb">
                                    <img src="${thumb}" alt="Product">
                                </div>
                                <div class="order-meta">
                                    <h3>Đơn #${order.readableId || order._id.slice(-6).toUpperCase()}</h3>
                                    <p>${new Date(order.createdAt).toLocaleDateString('vi-VN')} · ${order.items?.length} sản phẩm</p>
                                </div>
                            </div>
                            <span class="status-pill status-${order.status}">${statusInfo.label}</span>
                        </div>
                        
                        <div class="accordion-content" id="accordion-${order._id}">
                            <div class="progress-container-inner" style="display:block;">
                                ${progressHtml}
                            </div>
                            <div class="item-mini-list">
                                <p style="font-size: 0.75rem; color: #888; text-transform:uppercase; margin-bottom:10px; font-weight:700;">Chi tiết đơn hàng</p>
                                ${order.items.map(item => `
                                    <div class="item-mini">
                                        <span>${item.name} <small>(x${item.quantity})</small></span>
                                        <b>${(item.price * item.quantity).toLocaleString()}đ</b>
                                    </div>
                                `).join('')}
                                <div class="item-mini" style="margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,0.1);">
                                    <span>Phí giao hàng</span>
                                    <b>0đ</b>
                                </div>
                            </div>
                        </div>

                        <div class="order-footer">
                            <div class="order-total">Tổng: ${order.total.toLocaleString()} VNĐ</div>
                            <button class="btn-track" onclick="toggleAccordion('${order._id}')">
                                <span>Xem tiến trình</span>
                                <small>↓</small>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusLabel(s) {
            const map = {
                'pending': { label: 'Chờ duyệt' },
                'paid': { label: 'Đã thanh toán' },
                'processing': { label: 'Đã xác nhận' },
                'shipping': { label: 'Đang giao' },
                'completed': { label: 'Thành công' },
                'cancelled': { label: 'Đã hủy' }
            };
            return map[s] || { label: s };
        }

        function renderProgress(order) {
            const status = order.status;
            const steps = ['pending', 'processing', 'shipping', 'completed'];
            const labels = ['Đặt hàng', 'Đã xác nhận', 'Đang giao', 'Thành công'];
            
            let currentIndex = steps.indexOf(status);
            if (order.paymentStatus === 'paid' && status === 'pending') {
                 currentIndex = 1;
            }

            return `
                <div class="progress-bar">
                    ${steps.map((step, i) => {
                        let cls = '';
                        if (status === 'cancelled') cls = '';
                        else if (i < currentIndex) cls = 'done';
                        else if (i === currentIndex) cls = 'active';
                        
                        return `
                            <div class="p-step ${cls}">
                                <div class="p-dot">${i < currentIndex ? '✓' : (i + 1)}</div>
                                <span class="p-label">${labels[i]}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function toggleAccordion(id) {
            const el = document.getElementById(`accordion-${id}`);
            el.classList.toggle('open');
            const btn = el.parentElement.querySelector('.btn-track span');
            const arrow = el.parentElement.querySelector('.btn-track small');
            if (el.classList.contains('open')) {
                btn.innerText = "Thu gọn";
                arrow.innerText = "↑";
            } else {
                btn.innerText = "Xem tiến trình";
                arrow.innerText = "↓";
            }
        }

        function renderVouchers() {
            const container = document.getElementById('vouchers-list');
            if (myVouchers.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎟️</div><p>Bạn hiện không có voucher nào.</p></div>';
                return;
            }

            container.innerHTML = myVouchers.map(v => `
                <div class="voucher-card">
                    <div class="v-info">
                        <h4>${v.code}</h4>
                        <p>${v.description}</p>
                    </div>
                    <button class="btn-copy" onclick="copyVoucher('${v.code}')">Sao chép</button>
                </div>
            `).join('');
        }

        function copyVoucher(code) {
            navigator.clipboard.writeText(code);
            alert("Đã sao chép mã: " + code);
        }

        function startAutoRefresh() {
            setInterval(loadData, 5000);
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
