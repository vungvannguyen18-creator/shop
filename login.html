<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký — Fashion Modern</title>
    <meta name="description" content="Đăng nhập hoặc đăng ký tài khoản Fashion Modern để trải nghiệm mua sắm thời trang cao cấp và nhận nhiều ưu đãi độc quyền dành riêng cho thành viên.">
    <meta name="keywords" content="đăng nhập, đăng ký, thành viên, fashion modern">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK (Compat form for simple vanilla JS inclusion) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body data-auth-mode="login">
<div class="login-wrapper">
    <div class="minimal-login-card fade-in">
        <div class="minimal-header">
            <h2 class="auth-title">ĐĂNG NHẬP</h2>
            <p class="subtitle">Nếu bạn đã có tài khoản, hãy đăng nhập để tích lũy điểm thành viên và nhận được những ưu đãi tốt hơn!</p>
        </div>

        <div class="minimal-form">
            <div class="form-group login-form">
                <div class="input-field">
                    <label>Email hoặc Số điện thoại <span class="required">*</span></label>
                    <input id="user" type="text" placeholder="Nhập email hoặc SĐT" autocomplete="username">
                </div>

                <div class="input-field">
                    <label>Mật khẩu <span class="required">*</span></label>
                    <div class="password-input-wrapper">
                        <input id="pass" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
                        <button type="button" class="toggle-pass-btn" onclick="togglePassword()">Hiện</button>
                    </div>
                </div>

                <div class="extra-actions">
                    <a href="javascript:void(0)" class="forgot-link" onclick="openForgotModal()">Bạn quên mật khẩu?</a>
                </div>

                <button class="btn-black-long ripple" id="submit-button" onclick="login()">TIẾP TỤC</button>
            </div>

            <div class="divider-text">Hoặc</div>

            <div class="alternative-actions">
                <button class="btn-outline-long ripple" onclick="switchAuthMode('register')">TẠO TÀI KHOẢN</button>
            </div>
            
            <div class="social-login-grid">
                <button class="btn-social-mini" onclick="socialLogin('google')">Google</button>
                <button class="btn-social-mini" onclick="socialLogin('facebook')">Facebook</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Quên mật khẩu -->
<div id="modal-forgot-password" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
    <div style="background: #fff; border-radius: 24px; padding: 32px; width: 90%; max-width: 400px; color: #111;">
        <h2 style="margin-bottom: 12px; font-weight: 800; font-size: 1.4rem;">Khôi phục mật khẩu</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 24px;">Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu mới.</p>
        
        <div class="input-field" style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">Email của bạn</label>
            <input id="forgot-email" type="email" placeholder="example@gmail.com" style="width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-family: inherit;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button id="btn-submit-forgot" onclick="submitForgot()" style="width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: inherit;">GỬI YÊU CẦU</button>
            <button onclick="closeForgotModal()" style="width: 100%; padding: 14px; background: transparent; color: #888; border: none; font-weight: 600; cursor: pointer; font-family: inherit;">Quay lại đăng nhập</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script>
    function togglePassword(fieldId = 'pass') {
        const pass = document.getElementById(fieldId);
        if (!pass) return;
        pass.type = pass.type === 'password' ? 'text' : 'password';
    }

    function redirectIfAuthenticated() {
        const user = getCurrentUser();
        if (!user) return;
        if (user.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'index.html';
        }
    }

    function switchAuthMode(mode) {
        const body = document.body;
        body.dataset.authMode = mode;
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.mode === mode);
        });
        const title = document.querySelector('.auth-title');
        const subtitle = document.querySelector('.subtitle');
        if (mode === 'register') {
            title.innerText = 'Tạo tài khoản mới';
            subtitle.innerText = 'Bắt đầu hành trình mua sắm sang xịn';
        } else {
            title.innerText = 'Chào mừng trở lại 👋';
            subtitle.innerText = 'Đăng nhập để mua sắm';
        }
    }

    function openForgotModal() {
        document.getElementById('modal-forgot-password').style.display = 'flex';
    }

    function closeForgotModal() {
        document.getElementById('modal-forgot-password').style.display = 'none';
    }

    async function submitForgot() {
        const email = document.getElementById('forgot-email').value.trim();
        if (!email) {
            alert("Vui lòng nhập email của bạn.");
            return;
        }

        const btn = document.getElementById('btn-submit-forgot');
        const originalText = btn.innerText;

        try {
            btn.disabled = true;
            btn.innerText = "Đang gửi...";

            const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            alert(data.message);
            if (res.ok) closeForgotModal();
        } catch (e) {
            alert("Lỗi kết nối máy chủ.");
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        redirectIfAuthenticated();
        switchAuthMode('login');
        document.querySelectorAll('.ripple').forEach(button => {
            button.addEventListener('click', function (e) {
                const circle = document.createElement('span');
                const diameter = Math.max(this.clientWidth, this.clientHeight);
                const radius = diameter / 2;
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${e.clientX - this.getBoundingClientRect().left - radius}px`;
                circle.style.top = `${e.clientY - this.getBoundingClientRect().top - radius}px`;
                circle.classList.add('ripple-effect');
                const ripple = this.getElementsByClassName('ripple-effect')[0];
                if (ripple) ripple.remove();
                this.appendChild(circle);
            });
        });
    });
</script>
</body>
</html>
