<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàn thiện hồ sơ | Fashion Modern</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .onboarding-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .onboarding-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .onboarding-header {
            margin-bottom: 32px;
            text-align: center;
        }
        .onboarding-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .onboarding-header p {
            color: #888;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }
        .form-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #555;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.03);
        }
        .connected-account {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #111;
            border-radius: 99px;
            margin-bottom: 32px;
            font-size: 0.85rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #222;
        }
        .btn-confirm {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 12px;
        }
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }
        .btn-confirm:active {
            transform: translateY(0);
        }
    </style>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>
<body>
    <div class="onboarding-page">
        <div class="onboarding-card fade-in">
            <div class="onboarding-header">
                <h1>Hoàn thiện hồ sơ</h1>
                <p>Vui lòng bổ sung thông tin để tiếp tục mua sắm</p>
            </div>

            <div class="connected-account" id="user-info-badge">
                <span style="color:#666">TÀI KHOẢN:</span>
                <span id="display-name" style="color:#fff; font-weight: 600;">...</span>
            </div>

            <div class="onboarding-form">
                <div class="form-group">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" id="full-name" class="form-input" placeholder="Nhập tên của bạn...">
                </div>
                <div class="form-group">
                    <label class="form-label">Số điện thoại</label>
                    <input type="tel" id="phone" class="form-input" placeholder="0xxx xxx xxx">
                </div>
                <div class="form-group">
                    <label class="form-label">Địa chỉ giao hàng</label>
                    <textarea id="address" class="form-input" style="height: 100px; resize: none;" placeholder="Số nhà, tên đường, Phường/Xã..."></textarea>
                </div>

                <button class="btn-confirm" onclick="submitProfile()">XÁC NHẬN & MUA SẮM</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="onboarding.js"></script>
</body>
</html>
